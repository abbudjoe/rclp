name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[dev]'
      - run: python -m compileall src tests
      - run: python -m pytest
      - run: python tests/evals/eval_runner.py
      - name: demo smoke
        run: |
          python -m rclp_agents.demo_remote_assist --network-profile uplink_bad > /tmp/rclp_demo.txt
          grep -q "POLICY_SATISFIED" /tmp/rclp_demo.txt
          grep -q "LEASE_VALID" /tmp/rclp_demo.txt
          grep -q "NO_LEASE" /tmp/rclp_demo.txt
          grep -q "NETWORK_UPLINK_TOO_LOW" /tmp/rclp_demo.txt
          grep -q "NETWORK_PROFILE_REVOKE" /tmp/rclp_demo.txt
          grep -q "LEASE_REVOKED" /tmp/rclp_demo.txt
          grep -q "audit_jsonl" /tmp/rclp_demo.txt
          grep -q "incident_replay_summary" /tmp/rclp_demo.txt
