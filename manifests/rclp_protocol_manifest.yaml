protocol: RCLP
name: Robot Capability Lease Protocol
version: 0.0.1-draft
status: experimental
primary_object: physical_capability_lease
messages:
  - AgentAttestation
  - RobotStateAssertion
  - NetworkStateAssertion
  - CapabilityRequest
  - CapabilityDecision
  - CapabilityLease
  - EdgeCommand
  - LeaseRevocation
  - FallbackDeclaration
  - AuditCommit
message_models:
  AgentAttestation:
    python_model: rclp_core.models.AgentAttestation
    message_type: agent_attestation
    required_fields:
      - protocol_version
      - message_id
      - correlation_id
      - created_at
      - message_type
      - agent_id
      - authenticated_agent_id
      - kind
      - manifest_digest
      - public_key_id
      - trust_tier
      - signature
    runtime_required_fields:
      - protocol_version
      - message_id
      - correlation_id
      - created_at
      - message_type
      - authenticated_agent_id
      - trust_tier
      - signature
  RobotStateAssertion:
    python_model: rclp_core.models.RobotStateAssertion
    message_type: robot_state_assertion
    required_fields:
      - protocol_version
      - message_id
      - correlation_id
      - created_at
      - message_type
      - robot_id
      - edge_agent_id
      - authenticated_edge_agent_id
      - mission_id
      - safety_state
      - geofence_state
      - network_state
      - observed_at
      - signature
    runtime_required_fields:
      - protocol_version
      - message_id
      - correlation_id
      - created_at
      - message_type
      - authenticated_edge_agent_id
      - safety_state
      - observed_at
      - signature
  NetworkStateAssertion:
    python_model: rclp_core.models.NetworkStateAssertion
    message_type: network_state_assertion
    required_fields:
      - protocol_version
      - message_id
      - correlation_id
      - created_at
      - message_type
      - edge_agent_id
      - robot_id
      - mission_id
      - profile
      - attached
      - latency_ms_p95
      - packet_loss_pct
      - uplink_mbps
      - observed_at
      - measurement_window_seconds
      - source
      - signature
    runtime_required_fields:
      - protocol_version
      - message_id
      - correlation_id
      - created_at
      - message_type
      - observed_at
      - signature
  CapabilityRequest:
    python_model: rclp_core.models.CapabilityRequest
    message_type: capability_request
    required_fields:
      - protocol_version
      - message_id
      - correlation_id
      - created_at
      - message_type
      - requesting_agent_id
      - authenticated_agent_id
