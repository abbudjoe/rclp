      - message_id
      - correlation_id
      - created_at
      - message_type
      - audit_id
      - event_type
      - actor_id
      - robot_id
      - mission_id
      - summary
      - payload
      - payload_hash
      - authority_relevant
      - integrity_profile
      - integrity_proof
