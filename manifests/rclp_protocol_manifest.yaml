      - protocol_version
      - message_id
      - correlation_id
      - created_at
      - message_type
      - authenticated_agent_id
      - requested_duration_seconds
      - request_nonce
      - signature
  CapabilityDecision:
    python_model: rclp_core.models.CapabilityDecision
    message_type: capability_decision
    required_fields:
      - protocol_version
      - message_id
      - correlation_id
      - created_at
      - message_type
      - request_id
      - decision
      - reason_code
      - deciding_actor_id
      - policy_id
      - policy_digest
      - audit_id
      - lease
      - safe_alternatives
