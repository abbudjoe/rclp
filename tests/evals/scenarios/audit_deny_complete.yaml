name: audit_deny_complete
description: The missing-lease deny path has the audit fields needed for eval replay without emitting fallback.
kind: command_gate
now_unix_ms: 1760000000000
input:
  include_current_state: true
  lease:
    present: false
expected:
  decision: deny
  reason_code: NO_LEASE
  audit_required_fields:
    - event_id
    - timestamp
    - decision
    - reason_code
    - central_agent_id
    - edge_agent_id
    - robot_id
    - mission_id
    - requested_capability
    - network_state
    - geofence_state
